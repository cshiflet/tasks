name: Run automated checks

on:
  pull_request:
    # Skip Android lint + test when a PR only touches the Rust/Qt
    # desktop client or its release workflow. The desktop-native
    # matrix (check-linux / -macos / -windows) covers those files
    # and Android CI has nothing to say about them. `paths-ignore`
    # is OR'd across the listed globs; a PR that touches *both*
    # desktop-native and any app/kmp/data file still triggers
    # Android CI, which is what we want.
    #
    # The two non-desktop-native entries (`CLAUDE.md` + this
    # workflow file itself) are here so the in-flight native-client
    # PR doesn't keep re-spawning Android jobs every time we tweak
    # top-level docs or iterate on this filter. Revisit once that
    # PR merges — a real Android-CI logic change should still run
    # Android CI.
    paths-ignore:
      - 'desktop-native/**'
      - '.github/workflows/desktop-native.yml'
      - '.github/workflows/desktop-native-release.yml'
      - 'CLAUDE.md'
      - '.github/workflows/check.yml'
      - '.gitignore'
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Lint checks
        run: bundle exec fastlane lint

      - name: Archive lint reports
        uses: actions/upload-artifact@v7
        if: ${{ always() }}
        with:
          name: lint-reports
          path: app/build/reports/*.html

  jvmTest:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run JVM tests
        run: ./gradlew -Pcoverage app:createGoogleplayDebugUnitTestCoverageReport app:createGenericDebugUnitTestCoverageReport jvmTest

      - name: Upload test reports
        uses: actions/upload-artifact@v7
        if: ${{ always() }}
        with:
          name: test-reports-jvm
          path: |
            app/build/reports/**
            data/build/reports/**
            kmp/build/reports/**

  instrumentedTest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        flavor: [Googleplay, Generic]
        api-level: [29]
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew app:connected${{ matrix.flavor }}DebugAndroidTest

      - name: Upload test reports
        uses: actions/upload-artifact@v7
        if: ${{ always() }}
        with:
          name: test-reports-${{ matrix.flavor }}
          path: app/build/reports/**
